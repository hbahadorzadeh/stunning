# CI Pipeline - Build and Test in Docker Containers
# This workflow builds and tests the project inside Docker containers
# to ensure consistency across environments and reduce dependency issues.
#
# Jobs using Docker:
# - build: Compiles CLI and all packages in Docker
# - unit-tests: Runs unit tests with coverage inside Docker
# - integration-tests: Runs protocol and library tests inside Docker
# - race-detector: Detects race conditions inside Docker
#
# Jobs running natively:
# - lint: Code formatting and linting checks
# - sast: Security scanning with gosec
# - dependencies: Dependency vulnerability checks
# - code-quality: Static analysis with various tools
#
# The Dockerfile provides all necessary build dependencies including
# X11/OpenGL libraries needed for desktop app compilation.

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Run gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Go files are not formatted:"
            gofmt -s -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --issues-exit-code=1

  sast:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec security scanner
        run: gosec -no-fail -fmt json -out gosec-report.json ./... || true

      - name: Upload security report
        uses: actions/upload-artifact@v7
        with:
          name: gosec-report
          path: gosec-report.json

      - name: Check for high severity issues
        run: |
          if grep -q '"Severity":"HIGH"' gosec-report.json || grep -q '"Severity":"CRITICAL"' gosec-report.json; then
            echo "High or Critical severity security issues found!"
            cat gosec-report.json | jq '.Issues[] | select(.Severity=="HIGH" or .Severity=="CRITICAL")'
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t stunning-build:ci .

      - name: Build all packages
        run: docker run --rm -v ${{ github.workspace }}:/app -w /app stunning-build:ci bash -c "go build -buildvcs=false ./..."

      - name: Build main binary
        run: docker run --rm -v ${{ github.workspace }}:/app -w /app -e CGO_ENABLED=0 stunning-build:ci bash -c "go build -buildvcs=false -v -o stunning ."

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: stunning-binary-linux-${{ github.sha }}
          path: ./stunning
          retention-days: 5

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t stunning-build:ci .

      - name: Run unit tests with coverage
        run: docker run --rm -v ${{ github.workspace }}:/app -w /app -e CGO_ENABLED=1 stunning-build:ci bash -c "
          go test -v -race -buildvcs=false -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
          "

      - name: Extract coverage file
        run: docker run --rm -v ${{ github.workspace }}:/app -w /app -e CGO_ENABLED=1 stunning-build:ci bash -c "cat coverage.out" > coverage.out || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t stunning-build:ci .

      - name: Run integration tests
        run: docker run --rm -v ${{ github.workspace }}:/app -w /app -e CGO_ENABLED=1 stunning-build:ci bash -c "
          echo '=== Core Tunnel Tests ===' &&
          go test -v -buildvcs=false -timeout=10s ./core/tunnel/dns &&
          go test -v -buildvcs=false -timeout=10s ./core/tunnel/h2 &&
          go test -v -buildvcs=false -timeout=10s ./core/tunnel/icmp || true &&
          go test -v -buildvcs=false -timeout=10s ./core/tunnel/udps &&
          go test -v -buildvcs=false -timeout=10s ./core/tunnel/ws &&
          echo '=== Library Tests ===' &&
          go test -v -buildvcs=false -timeout=10s ./bindings &&
          go test -v -buildvcs=false -timeout=10s ./clib &&
          echo '=== Desktop App Tests ===' &&
          go test -v -buildvcs=false -timeout=30s ./app/desktop/... || true
          "

  race-detector:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t stunning-build:ci .

      - name: Run tests with race detector
        run: docker run --rm -v ${{ github.workspace }}:/app -w /app -e CGO_ENABLED=1 stunning-build:ci bash -c "
          go test -race -buildvcs=false -timeout=60s ./...
          "
        continue-on-error: true

  dependencies:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Check for vulnerable dependencies
        run: go list -json -m all | go run github.com/sonatype-nexus-community/nancy@latest sleuth || true

      - name: Verify module integrity
        run: go mod verify

      - name: Check for outdated dependencies
        run: |
          go install github.com/psampaz/go-mod-outdated@latest
          go list -u -m -json all | go-mod-outdated -update -direct || true

  code-quality:
    name: Code Quality Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Install tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/mgechev/revive@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run revive
        run: revive -config .revive.toml -set_exit_status ./...

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, sast, build, unit-tests, integration-tests, race-detector, dependencies, code-quality]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "Lint & Format: ${{ needs.lint.result }}"
          echo "SAST Security Scan: ${{ needs.sast.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Race Detector: ${{ needs.race-detector.result }}"
          echo "Dependency Check: ${{ needs.dependencies.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"

          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.sast.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ] || \
             [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.code-quality.result }}" = "failure" ]; then
            echo "❌ Critical checks failed"
            exit 1
          else
            echo "✓ All critical checks passed"
          fi
